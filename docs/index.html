<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Local AI Image Upscaler</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #20313c;
      background:
        radial-gradient(circle at 18% 16%, rgba(56,168,232,.24), transparent 28%),
        linear-gradient(135deg, #eaf4f8 0%, #f7fbfd 62%, #edf6fb 100%);
    }
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 56px 24px;
    }
    .card {
      padding: 34px;
      border-radius: 24px;
      background: rgba(255,255,255,.68);
      border: 1px solid rgba(120,160,184,.34);
      box-shadow: 0 24px 74px rgba(44,90,119,.16);
      backdrop-filter: blur(18px);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 42px;
    }
    p {
      color: #607582;
      line-height: 1.7;
    }
    code {
      display: block;
      padding: 16px;
      border-radius: 14px;
      background: #f7fbfd;
      color: #20313c;
      overflow-x: auto;
    }
    .pill {
      display: inline-block;
      margin: 6px 8px 6px 0;
      padding: 9px 13px;
      border-radius: 999px;
      background: #e2f5fc;
      color: #176d9f;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Local AI Image Upscaler</h1>
      <p>一个本地运行的图片高清放大工具，用于把 AI 生成图、产品图、设计图、线稿图进行 2x / 4x 放大和轻度锐化。</p>
      <p>
        <span class="pill">Local Only</span>
        <span class="pill">No Paid API</span>
        <span class="pill">JPG / PNG / WEBP</span>
        <span class="pill">2x / 4x</span>
      </p>
      <h2>运行方式</h2>
      <code>python3 -m pip install -r requirements.txt<br />python3 main.py</code>
      <p>运行后打开本地地址 <strong>http://127.0.0.1:7860</strong>。图片处理在本机完成，不上传到这个介绍页。</p>
    </section>
  </main>
</body>
</html>
