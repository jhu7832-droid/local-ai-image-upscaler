<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>反馈已提交</title>
  <style>
    :root {
      --ink: #20313c;
      --muted: #617583;
      --blue: #268dc6;
      --panel: rgba(255, 255, 255, 0.76);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 18%, rgba(56, 168, 232, 0.22), transparent 28%),
        linear-gradient(135deg, #eaf4f8 0%, #f7fbfd 58%, #edf6fb 100%);
    }
    .panel {
      width: min(680px, 100%);
      padding: 34px;
      border: 1px solid rgba(120, 160, 184, 0.34);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 24px 74px rgba(44, 90, 119, 0.14);
      backdrop-filter: blur(18px);
    }
    h1 {
      margin: 0 0 14px;
      font-size: 34px;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.7;
    }
    a {
      display: inline-flex;
      min-height: 46px;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, #38a8e8, #237db1);
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 12px 28px rgba(56, 168, 232, 0.24);
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>反馈已提交</h1>
    <p>谢谢你的反馈。站长可以在 Netlify Forms 后台查看这条信息；如果已开启邮件通知，也会发送到设置的邮箱。</p>
    <p>Thank you. The site owner can view this message in Netlify Forms, and receive an email when form notifications are enabled.</p>
    <a href="/">返回首页 / Back Home</a>
  </main>
</body>
</html>
