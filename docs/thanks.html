<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>反馈已提交</title>
  <style>
    :root {
      --bg: #f4f8f9;
      --surface: #ffffff;
      --ink: #13262d;
      --muted: #4c646c;
      --line: rgba(24, 72, 84, 0.16);
      --accent: #044d5d;
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Geist, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 4%, rgba(8, 112, 130, 0.14), transparent 28rem),
        linear-gradient(180deg, #f7fbfc 0%, var(--bg) 100%);
    }
    .panel {
      width: min(680px, 100%);
      padding: clamp(28px, 5vw, 48px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.86);
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(34px, 6vw, 54px);
      line-height: 1.02;
      letter-spacing: -0.035em;
      text-wrap: balance;
    }
    p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.72;
      max-width: 58ch;
    }
    a {
      display: inline-flex;
      min-height: 48px;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      border-radius: 999px;
      color: #fff;
      background: var(--accent);
      font-weight: 850;
      text-decoration: none;
    }
    a:active { transform: translateY(1px) scale(.99); }
  </style>
</head>
<body>
  <main class="panel">
    <h1>反馈已提交</h1>
    <p>谢谢你的反馈。站长可以在 Netlify Forms 后台查看这条信息。</p>
    <p>Thank you. The site owner can view this message in Netlify Forms.</p>
    <a href="/">返回首页 / Back Home</a>
  </main>
</body>
</html>
